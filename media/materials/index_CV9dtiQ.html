<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Summary</title>

<style>
/* RESET */
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: url(images/pattern-background-desktop.svg) no-repeat center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* CARD */
.order-container {
  background: #fff;
  border-radius: 15px;
  overflow: hidden;
  width: 350px;
  text-align: center;
  box-shadow: 0 10px 20px rgba(0,0,0,0.15);
}

/* IMAGE */
.order-container img.hero {
  width: 100%;
}

/* TEXT */
.content {
  padding: 25px;
}

h1 {
  margin: 10px 0;
  font-size: 22px;
}

p {
  color: #777;
  font-size: 14px;
  line-height: 1.5;
}

/* PLAN SECTION (THIS IS THE MAIN FIX) */
.plan-box {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #f5f7ff;
  padding: 15px;
  border-radius: 10px;
  margin: 20px 0;
}

/* LEFT SIDE (ICON + TEXT) */
.plan-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.plan-left img {
  width: 40px;
}

.plan-text {
  text-align: left;
}

.plan-text strong {
  display: block;
  font-size: 14px;
}

.plan-text span {
  font-size: 13px;
  color: #777;
}

/* CHANGE LINK */
.change {
  color: blue;
  font-size: 13px;
  text-decoration: none;
}

.change:hover {
  text-decoration: underline;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: blue;
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  opacity: 0.8;
}

/* CANCEL */
.cancel {
  display: block;
  margin-top: 15px;
  font-size: 13px;
  color: #777;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="order-container">

  <img class="hero" src="illustration-hero.svg" alt="hero">

  <div class="content">

    <h1>Order Summary</h1>

    <p>
      You can now listen to millions of songs,<br>
      audiobooks, and podcasts on any device<br>
      anywhere you like!
    </p>

    <!-- FIXED PLAN SECTION -->
    <div class="plan-box">

      <div class="plan-left">
        <img src="icon-music.svg" alt="music">
        
        <div class="plan-text">
          <strong>Annual Plan</strong>
          <span>$59.99/year</span>
        </div>
      </div>

      <a href="" class="change">Change</a>

    </div>

    <button>Proceed to Payment</button>

    <a href="#" class="cancel">Cancel Order</a>

  </div>

</div>

</body>
</html>
