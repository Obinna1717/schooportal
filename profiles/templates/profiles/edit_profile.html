{% extends "dashboard_base.html" %}

{% block content %}

<div class="page-header">

    <h1>✏️ Edit Profile</h1>

    <p>
        Update your personal information below.
    </p>

</div>

<div class="form-card">

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <div class="form-actions">

            <button
                type="submit"
                class="btn btn-primary">

                💾 Save Changes

            </button>

            <a
                href="{% url 'profile' %}"
                class="btn btn-secondary">

                ← Back to Profile

            </a>

        </div>

    </form>

</div>

{% endblock %}
