{% extends "dashboard_base.html" %}

{% block content %}

<div class="page-header">

    <h1>📋 Take Attendance</h1>

    <p>
        Select the course you want to take attendance for.
    </p>

</div>

<div class="form-card">

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <div class="form-actions">

            <button
                type="submit"
                class="btn btn-primary">

                Continue →

            </button>

            <a
                href="{% url 'lecturer_dashboard' %}"
                class="btn btn-secondary">

                ← Dashboard

            </a>

        </div>

    </form>

</div>

{% endblock %}
