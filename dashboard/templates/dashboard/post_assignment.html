{% extends "dashboard_base.html" %}

{% block content %}

<div class="page-header">

    <h1>📝 Post Assignment</h1>

    <p>
        Create a new assignment for students enrolled in your course.
    </p>

</div>

<div class="form-card">

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        {{ form.as_p }}

        <div class="form-actions">

            <button
                type="submit"
                class="btn btn-primary">

                📤 Post Assignment

            </button>

            <a
                href="{% url 'lecturer_dashboard' %}"
                class="btn btn-secondary">

                ← Back to Dashboard

            </a>

        </div>

    </form>

</div>

{% endblock %}
