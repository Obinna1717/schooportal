{% extends "student_dashboard_base.html" %}

{% block content %}

<div class="page-header">

    <h1>✏️ Edit Assignment Submission</h1>

    <p>
        Replace or update your assignment submission before the deadline.
    </p>

</div>

<div class="form-card">

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        {{ form.as_p }}

        <div class="form-actions">

            <button
                type="submit"
                class="btn btn-primary">

                💾 Save Changes

            </button>

            <a
                href="{% url 'my_submitted_assignment' %}"
                class="btn btn-secondary">

                ← Back to My Submissions

            </a>

        </div>

    </form>

</div>

{% endblock %}
