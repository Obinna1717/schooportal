{% extends "student_dashboard_base.html" %}

{% block content %}

<div class="page-header">

    <h1>🗑 Delete Assignment Submission</h1>

    <p>
        This action cannot be undone.
    </p>

</div>

<div class="confirm-card">

    <div class="warning-icon">

        ⚠️

    </div>

    <h2>

        Delete Submission?

    </h2>

    <p>

        You are about to permanently delete your submission for

        <strong>

            {{ object.assignment.title }}

        </strong>

    </p>

    <form method="POST">

        {% csrf_token %}

        <div class="form-actions">

            <button
                type="submit"
                class="btn btn-danger">

                🗑 Delete Submission

            </button>

            <a
                href="{% url 'my_submitted_assignment' %}"
                class="btn btn-secondary">

                Cancel

            </a>

        </div>

    </form>

</div>

{% endblock %}
